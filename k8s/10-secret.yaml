# All Report Studio backend config in one Secret (uses a single envFrom secret).
# Non-sensitive config (URLs, usernames, bucket) is kept here as-is. The three SENSITIVE values are
# placeholders on purpose — NO real secret is committed to Git.
#
# After `kubectl apply -f k8s/`, set real strong values with:   ./rotate-secrets.sh
# (generates JWT_SECRET / DB_PASSWORD / MINIO_SECRET_KEY, patches this Secret, rolls the workloads).
# For a throwaway local SIT you may instead replace the __SET_BY_ROTATE_SCRIPT__ placeholders below —
# but do not commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: reportstudio-secret
  namespace: reportstudio
type: Opaque
stringData:
  # served under the /reportstudio basename
  CONTEXT_PATH: "/reportstudio/api"

  # --- dedicated Postgres (00-storage-postgres.yaml) ---
  DB_URL: "jdbc:postgresql://reportstudio-postgres.reportstudio.svc.cluster.local:5432/reportstudio"
  DB_USER: "reportstudio"
  DB_PASSWORD: "__SET_BY_ROTATE_SCRIPT__"

  # --- dedicated Kafka (02-storage-kafka.yaml); shared a shared Kafka gave NOT_COORDINATOR ---
  KAFKA_BOOTSTRAP_SERVERS: "reportstudio-kafka.reportstudio.svc.cluster.local:9092"

  # --- dedicated MinIO (01-storage-minio.yaml). To reuse <your-minio-ns>: set
  #     MINIO_ENDPOINT=http://minio-service.<your-minio-ns>.svc.cluster.local:9000 and its keys ---
  MINIO_ENDPOINT: "http://reportstudio-minio.reportstudio.svc.cluster.local:9000"
  MINIO_ACCESS_KEY: "reportstudio"
  MINIO_SECRET_KEY: "__SET_BY_ROTATE_SCRIPT__"
  MINIO_BUCKET: "report-outputs"

  # --- auth ---
  JWT_SECRET: "__SET_BY_ROTATE_SCRIPT__"
  JWT_TTL_MINUTES: "120"

  # Browser origin(s), matched as patterns. "*" = any origin — safe here because auth is
  # Bearer-token (no cookies), and the app is reached via a NodePort test link on varying host/IP.
  # Restrict to specific origins (comma-separated) once a fixed /reportstudio host is assigned.
  CORS_ORIGINS: "*"
