# Dedicated Kafka (KRaft single-node) for Report Studio's render gateway. The shared a shared Kafka
# advertises listeners our pod can't use as coordinator (NOT_COORDINATOR), so we run our own.
# emptyDir = ephemeral (the report.jobs topic is transient anyway).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reportstudio-kafka
  namespace: reportstudio
  labels: { app: reportstudio-kafka }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: reportstudio-kafka }
  template:
    metadata:
      labels: { app: reportstudio-kafka }
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          ports:
            - { containerPort: 9092 }
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093" }
            # advertised = the in-cluster Service FQDN so clients reach the coordinator correctly
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://reportstudio-kafka.reportstudio.svc.cluster.local:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
            - { name: CLUSTER_ID, value: "MkU3OEVBNTcwNTJENDM2Qk" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/kafka/data }
          resources:
            requests: { memory: "512Mi", cpu: "150m" }
            limits:   { memory: "1Gi",   cpu: "1000m" }
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: reportstudio-kafka
  namespace: reportstudio
spec:
  selector: { app: reportstudio-kafka }
  ports:
    - { protocol: TCP, port: 9092, targetPort: 9092 }
  type: ClusterIP
