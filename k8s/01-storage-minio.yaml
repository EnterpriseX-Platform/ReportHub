# Dedicated MinIO for Report Studio (reportstudio). NFS-backed PVC (05-persistent-volumes.yaml) = durable (rendered outputs reset on
# restart) — fine for SIT. To reuse the shared <your-minio-ns> instead: delete this file and point
# MINIO_ENDPOINT + MINIO_ACCESS_KEY/SECRET_KEY in the Secret at minio-service.<your-minio-ns>:9000.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reportstudio-minio
  namespace: reportstudio
  labels: { app: reportstudio-minio }
spec:
  replicas: 1
  selector:
    matchLabels: { app: reportstudio-minio }
  template:
    metadata:
      labels: { app: reportstudio-minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-09-22T00-33-43Z
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - { containerPort: 9000 }
            - { containerPort: 9001 }
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: reportstudio-secret, key: MINIO_ACCESS_KEY } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: reportstudio-secret, key: MINIO_SECRET_KEY } }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "512Mi", cpu: "500m" }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: reportstudio-minio-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: reportstudio-minio
  namespace: reportstudio
spec:
  selector: { app: reportstudio-minio }
  ports:
    - { name: api, protocol: TCP, port: 9000, targetPort: 9000 }
    - { name: console, protocol: TCP, port: 9001, targetPort: 9001 }
  type: ClusterIP
