apiVersion: apps/v1
kind: Deployment
metadata:
  name: reportstudio-app
  namespace: reportstudio
  labels: { app: reportstudio-app }
spec:
  replicas: 1
  selector:
    matchLabels: { app: reportstudio-app }
  template:
    metadata:
      labels: { app: reportstudio-app }
    spec:
      imagePullSecrets:
        - name: component-docker
      containers:
        - name: reportstudio-app
          # basename /reportstudio + NEXT_PUBLIC_API_BASE are baked at build time (frontend/Dockerfile args).
          image: avalantoneweb/reportstudio-app:placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # SSR (server components) fetch the API in-cluster; the browser uses same-origin /reportstudio/api.
            - name: API_INTERNAL_BASE
              value: "http://reportstudio-api.reportstudio.svc.cluster.local:8080/reportstudio/api"
          readinessProbe:
            httpGet: { path: /reportstudio, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /reportstudio, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "512Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: reportstudio-app
  namespace: reportstudio
spec:
  selector: { app: reportstudio-app }
  ports:
    - { protocol: TCP, port: 3000, targetPort: 3000 }
  type: ClusterIP
